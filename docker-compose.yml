version: '3.8'

services:

  web:
    build: .
    container_name: django_app
    command: gunicorn data_pipeline.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:alpine
    container_name: redis_server

  celery:
    build: .
    container_name: celery_worker
    command: celery -A data_pipeline worker -l info
    env_file:
      - .env
    depends_on:
      - redis